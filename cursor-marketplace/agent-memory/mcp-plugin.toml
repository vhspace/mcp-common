# Universal MCP plugin config — single source of truth for all platforms.
# Run `mcp-plugin-gen` to produce Cursor, Claude Code, OpenCode, etc. configs.

name = "agent-memory"
description = "Long-term temporal knowledge graph memory for AI agents — search, store, and evolve operational knowledge across sessions"
repository = "https://github.com/vhspace/agent-memory"
license = "Apache-2.0"
keywords = ["mcp", "memory", "knowledge-graph", "graphiti", "neo4j", "temporal"]

[author]
name = "Together AI"

[server]
command = "uvx"
args = ["--from", "agent-memory", "agent-memory"]

[server.env]
NEO4J_URI = "${NEO4J_URI}"
NEO4J_USER = "${NEO4J_USER}"
NEO4J_PASSWORD = "${NEO4J_PASSWORD}"
LLM_PROVIDER = "${LLM_PROVIDER}"
ANTHROPIC_API_KEY = "${ANTHROPIC_API_KEY}"
TOGETHER_API_KEY = "${TOGETHER_API_KEY}"
MODEL_NAME = "${MODEL_NAME}"
EMBEDDING_PROVIDER = "${EMBEDDING_PROVIDER}"
EMBEDDING_MODEL = "${EMBEDDING_MODEL}"

[cli]
name = "mem"
entry_point = "agent_memory.cli:app"
description = "Search and store agent memory from the command line"

[[skills]]
name = "agent-memory-usage"
description = "Use when searching for prior knowledge, storing incident resolutions, or managing long-term agent memory. Triggers on memory, remember, prior incidents, knowledge base, search history, past resolutions."
path = "skills/agent-memory-usage/SKILL.md"

[[rules]]
name = "agent-memory-cli"
path = "rules/agent-memory-cli.mdc"

[[hooks]]
event = "SessionStart"
script = "hooks/setup-cli"
async = true

[marketplace]
categories = ["ai", "productivity"]
tags = ["memory", "knowledge-graph", "neo4j", "temporal"]
