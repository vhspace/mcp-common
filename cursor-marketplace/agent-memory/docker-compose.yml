services:
  neo4j:
    image: neo4j:5.26-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/changeme123
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j-data:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "changeme123", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  memory-server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      neo4j:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=changeme123
      - WORKSPACE_PATH=/workspace
      - RULES_OUTPUT_DIR=/workspace/.cursor/rules
    volumes:
      - ${HOST_WORKSPACE:?Set HOST_WORKSPACE to your workspace root}:/workspace:ro
      - ${HOST_WORKSPACE}/.cursor/rules:/workspace/.cursor/rules
    command: python -m agent_memory.server --transport sse --host 0.0.0.0 --port 8000
    restart: unless-stopped

volumes:
  neo4j-data:
