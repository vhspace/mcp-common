{{- if not .Values.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "weka-mcp.fullname" . }}
  labels:
    {{- include "weka-mcp.labels" . | nindent 4 }}
type: Opaque
stringData:
  WEKA_PASSWORD: {{ .Values.weka.password | quote }}
  {{- if .Values.mcpHttpAccessToken }}
  MCP_HTTP_ACCESS_TOKEN: {{ .Values.mcpHttpAccessToken | quote }}
  {{- end }}
{{- end }}
