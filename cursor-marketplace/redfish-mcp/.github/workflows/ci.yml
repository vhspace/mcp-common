name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  lint-and-test:
    strategy:
      matrix:
        runner: [ubuntu-latest, ubuntu-24.04-arm]
      fail-fast: false
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Install KVM runtime deps
        run: sudo apt-get update && sudo apt-get install -y openjdk-17-jre-headless openjdk-11-jdk xvfb x11vnc

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Lint (ruff check)
        run: uv run ruff check src tests

      - name: Format check (ruff format)
        run: uv run ruff format --check src tests

      - name: Type check (mypy)
        continue-on-error: true
        run: uv run mypy src/

      - name: Run tests (non-integration, non-e2e)
        run: uv run pytest -m "not integration and not e2e" -v

      - name: Build package
        run: uv build
