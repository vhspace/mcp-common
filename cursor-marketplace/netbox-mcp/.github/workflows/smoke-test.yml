name: Smoke Test

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync

      - name: Verify package imports
        run: |
          uv run python -c "
          from netbox_mcp import NetBoxRestClient, NETBOX_OBJECT_TYPES, Settings, __version__
          from netbox_mcp.server import mcp
          print(f'netbox-mcp v{__version__} - imports OK')
          print(f'Object types: {len(NETBOX_OBJECT_TYPES)}')
          "

      - name: Verify CLI entry point
        run: uv run netbox-mcp --help

      - name: Run tests
        run: uv run pytest -v -m "not e2e"
        env:
          NETBOX_URL: http://localhost:8000
          NETBOX_TOKEN: test-token
