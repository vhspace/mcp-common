{{- if not .Values.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ufm-mcp.fullname" . }}
  labels:
    {{- include "ufm-mcp.labels" . | nindent 4 }}
type: Opaque
stringData:
  UFM_TOKEN: {{ .Values.ufm.token | quote }}
  {{- if .Values.mcpHttpAccessToken }}
  MCP_HTTP_ACCESS_TOKEN: {{ .Values.mcpHttpAccessToken | quote }}
  {{- end }}
{{- end }}
