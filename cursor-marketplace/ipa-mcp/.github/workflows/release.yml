name: Release

permissions:
  contents: read
  issues: read
  pull-requests: read

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@85856786d1ce8acfbcc2f13a5f3fbd6b938f9f41 # v7.1.2
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync

      - name: Python Semantic Release
        uses: python-semantic-release/python-semantic-release@4d4cb0ab842247caea1963132c242c62aab1e4d5 # v10.4.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update release badge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          latest_tag="$(gh api "repos/${GITHUB_REPOSITORY}/releases/latest" --jq .tag_name 2>/dev/null || echo "no-release")"
          .github/scripts/update-release-badge.sh "$latest_tag"
          if ! git diff --quiet -- .github/badges/release.svg; then
            git add .github/badges/release.svg
            git -c user.name="github-actions[bot]" -c user.email="github-actions[bot]@users.noreply.github.com" \
              commit -m "chore: update release badge to ${latest_tag}"
            git push origin HEAD:main
          fi

      - name: Notify mcp-common marketplace
        if: success()
        env:
          GH_TOKEN: ${{ secrets.MARKETPLACE_DISPATCH_PAT }}
        run: |
          version=$(gh api "repos/${{ github.repository }}/releases/latest" --jq .tag_name 2>/dev/null || echo "unknown")
          gh api repos/vhspace/mcp-common/dispatches \
            --method POST \
            -f event_type=mcp-release \
            -f "client_payload[repo_name]=${{ github.event.repository.name }}" \
            -f "client_payload[repo_full]=${{ github.repository }}" \
            -f "client_payload[version]=$version" \
            -f "client_payload[sha]=${{ github.sha }}"
