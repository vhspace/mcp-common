name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout mcp-common
        uses: actions/checkout@v4
        with:
          repository: vhspace/mcp-common
          path: _mcp-common
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Place mcp-common as sibling
        run: mv _mcp-common ../mcp-common

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Lint
        run: uv run ruff check src/ tests/

      - name: Format check
        run: uv run ruff format --check src/ tests/

      - name: Test
        run: uv run pytest tests/ -x -q
