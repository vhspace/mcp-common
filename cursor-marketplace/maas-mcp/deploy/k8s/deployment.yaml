apiVersion: apps/v1
kind: Deployment
metadata:
  name: maas-mcp
  namespace: maas-mcp
  labels:
    app.kubernetes.io/name: maas-mcp
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: maas-mcp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: maas-mcp
    spec:
      containers:
        - name: maas-mcp
          image: maas-mcp:latest
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: MAAS_URL
              value: "https://maas.example.com/MAAS"
            - name: MAAS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: maas-mcp-secrets
                  key: MAAS_API_KEY
            - name: MCP_HTTP_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: maas-mcp-secrets
                  key: MCP_HTTP_ACCESS_TOKEN
            - name: VERIFY_SSL
              value: "false"
            - name: LOG_LEVEL
              value: "INFO"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
