name: MCP Conformance

on:
  push:
    branches: [main, feat/http-transport-helm]
  pull_request:
    branches: [main, feat/http-transport-helm]

permissions:
  contents: read

jobs:
  conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install uv
        uses: astral-sh/setup-uv@85856786d1ce8acfbcc2f13a5f3fbd6b938f9f41 # v7.1.2
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync

      - name: Start MCP server
        run: |
          uv run uvicorn ufm_mcp.server:create_app \
            --factory --host 127.0.0.1 --port 8000 &
          for i in $(seq 1 30); do
            if curl -sf 'http://127.0.0.1:8000/health?probe=liveness'; then
              echo "Server ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Server failed to start within 30s"
          exit 1
        env:
          UFM_URL: "https://ufm.example.com/"
          UFM_TOKEN: "fake-token-for-ci"
          TRANSPORT: "http"
          MCP_HTTP_ACCESS_TOKEN: ""

      - name: "Layer 1: MCP protocol conformance"
        uses: modelcontextprotocol/conformance@a2855b03582a6c0b31065ad4d9af248316ce61a3 # v0.1.15
        with:
          mode: server
          url: "http://127.0.0.1:8000/mcp"
        continue-on-error: true

      - name: "Layer 2: FastMCP tool discovery"
        run: |
          uv run python -c "
          import asyncio
          from fastmcp import Client
          async def test():
              async with Client('http://127.0.0.1:8000/mcp') as c:
                  tools = await c.list_tools()
                  print(f'OK: {len(tools)} tools discovered')
                  assert len(tools) > 0, 'No tools found'
                  for t in tools:
                      print(f'  - {t.name}')
          asyncio.run(test())
          "

      - name: "Layer 3: OpenCode connectivity check"
        run: npx opencode@latest mcp debug test-server 2>&1 || true
        continue-on-error: true

      - name: "Layer 4: Claude Code smoke test"
        if: github.event_name == 'push' && contains(github.ref, 'main')
        run: |
          npx @anthropic-ai/claude-code@latest -p "List all available tools" \
            --mcp-config '{"mcpServers":{"test":{"type":"http","url":"http://127.0.0.1:8000/mcp"}}}' \
            --allowedTools "mcp__test__*" \
            --output-format json 2>&1 | head -50
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        continue-on-error: true
