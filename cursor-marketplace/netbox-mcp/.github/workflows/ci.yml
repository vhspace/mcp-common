name: CI

on:
  push:
    branches: [main, feat/http-transport-helm]
  pull_request:
    branches: [main, feat/http-transport-helm]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install uv
        uses: astral-sh/setup-uv@85856786d1ce8acfbcc2f13a5f3fbd6b938f9f41 # v7.1.2
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync

      - name: Lint
        run: |
          uv run ruff check src/ tests/
          uv run ruff format --check src/ tests/

      - name: Unit tests
        run: uv run pytest -q -m "not integration and not e2e and not slow"

      - name: HTTP transport tests
        run: uv run pytest tests/test_http_transport.py tests/test_http_auth_integration.py -q -v
