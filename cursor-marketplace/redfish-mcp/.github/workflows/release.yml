name: Release

permissions:
  contents: read
  issues: read
  pull-requests: read

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release

    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync

      - name: Python Semantic Release
        uses: python-semantic-release/python-semantic-release@350c48fcb3ffcdfd2e0a235206bc2ecea6b69df0 # v10.5.3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update release badge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          latest_tag="$(gh api "repos/${GITHUB_REPOSITORY}/releases/latest" --jq .tag_name)"
          .github/scripts/update-release-badge.sh "$latest_tag"
          if ! git diff --quiet -- .github/badges/release.svg; then
            git add .github/badges/release.svg
            git -c user.name="github-actions[bot]" -c user.email="github-actions[bot]@users.noreply.github.com" \
              commit -m "chore: update release badge to ${latest_tag}"
            git push origin HEAD:main
          fi

      - name: Notify mcp-common marketplace
        if: success()
        env:
          GH_TOKEN: ${{ secrets.MARKETPLACE_DISPATCH_PAT }}
        run: |
          version=$(gh api "repos/${{ github.repository }}/releases/latest" --jq .tag_name 2>/dev/null || echo "unknown")
          gh api repos/vhspace/mcp-common/dispatches \
            --method POST \
            -f event_type=mcp-release \
            -f "client_payload[repo_name]=${{ github.event.repository.name }}" \
            -f "client_payload[repo_full]=${{ github.repository }}" \
            -f "client_payload[version]=$version" \
            -f "client_payload[sha]=${{ github.sha }}"
