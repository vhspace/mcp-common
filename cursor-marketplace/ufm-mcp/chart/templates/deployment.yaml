apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ufm-mcp.fullname" . }}
  labels:
    {{- include "ufm-mcp.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "ufm-mcp.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ufm-mcp.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.serviceAccount.name }}
      serviceAccountName: {{ .Values.serviceAccount.name }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
      containers:
        - name: {{ include "ufm-mcp.name" . }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: TRANSPORT
              value: "http"
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "8000"
            - name: UFM_URL
              value: {{ .Values.ufm.url | quote }}
            - name: VERIFY_SSL
              value: {{ .Values.ufm.verifySsl | quote }}
            - name: TIMEOUT_SECONDS
              value: {{ .Values.ufm.timeoutSeconds | quote }}
            - name: UFM_API_BASE_PATH
              value: {{ .Values.ufm.apiBasePath | quote }}
            - name: UFM_RESOURCES_BASE_PATH
              value: {{ .Values.ufm.resourcesBasePath | quote }}
            - name: UFM_LOGS_BASE_PATH
              value: {{ .Values.ufm.logsBasePath | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.logLevel | quote }}
            - name: UFM_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "ufm-mcp.secretName" . }}
                  key: UFM_TOKEN
            - name: MCP_HTTP_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "ufm-mcp.secretName" . }}
                  key: MCP_HTTP_ACCESS_TOKEN
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          startupProbe:
            httpGet:
              path: /health?probe=liveness
              port: http
            failureThreshold: 30
            periodSeconds: 2
          livenessProbe:
            httpGet:
              path: /health?probe=liveness
              port: http
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
