name: Rebuild Marketplaces

on:
  repository_dispatch:
    types: [mcp-release]
  workflow_dispatch:
    inputs:
      repo_filter:
        description: "Optional regex to filter repos by name (e.g. 'redfish|netbox')"
        required: false
        type: string
      dry_run:
        description: "Show what would be built without committing"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout mcp-common
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@85856786d1ce8acfbcc2f13a5f3fbd6b938f9f41 # v7.1.2
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Clone vhspace MCP repos
        env:
          GH_TOKEN: ${{ secrets.MARKETPLACE_DISPATCH_PAT }}
        run: |
          set -euo pipefail
          REPOS_DIR="/tmp/mcp-repos"
          mkdir -p "$REPOS_DIR"

          # Explicit list of MCP repos (code search doesn't work for private repos)
          REPOS="awx-mcp dc-support-mcp gpu-diag-mcp ipa-mcp maas-mcp netbox-mcp redfish-mcp ufm-mcp viz-mcp weka-mcp"

          FILTER="${{ inputs.repo_filter }}"

          for REPO_NAME in $REPOS; do
            FULL_NAME="vhspace/$REPO_NAME"

            # Apply optional filter
            if [[ -n "$FILTER" ]] && ! echo "$REPO_NAME" | grep -qE "$FILTER"; then
              echo "Filtered out: $REPO_NAME"
              continue
            fi

            # Get latest release tag, fall back to main
            TAG=$(gh release view --repo "$FULL_NAME" --json tagName --jq '.tagName' 2>/dev/null || echo "")
            REF="${TAG:-main}"

            echo "Cloning $FULL_NAME @ $REF"
            gh repo clone "$FULL_NAME" "$REPOS_DIR/$REPO_NAME" -- --depth 1 --branch "$REF" 2>/dev/null || \
              gh repo clone "$FULL_NAME" "$REPOS_DIR/$REPO_NAME" -- --depth 1
          done

          echo "repos_dir=$REPOS_DIR" >> "$GITHUB_ENV"
          echo "Cloned $(ls -1 "$REPOS_DIR" | wc -l) repos"

      - name: Build all marketplaces
        run: |
          set -euo pipefail
          DRY_RUN_FLAG=""
          if [[ "${{ inputs.dry_run }}" == "true" ]]; then
            DRY_RUN_FLAG="--dry-run"
          fi
          uv run python -m mcp_common.marketplace_builder \
            --repos-dir "${{ env.repos_dir }}" \
            --output-dir . \
            $DRY_RUN_FLAG

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet && git diff --cached --quiet && [ -z "$(git ls-files --others --exclude-standard)" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create PR
        if: steps.changes.outputs.changed == 'true' && inputs.dry_run != true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          BRANCH="chore/rebuild-marketplaces-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git add -A
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          TRIGGER_INFO=""
          if [[ "${{ github.event_name }}" == "repository_dispatch" ]]; then
            REPO="${{ github.event.client_payload.repo_name }}"
            VER="${{ github.event.client_payload.version }}"
            TRIGGER_INFO=" (triggered by ${REPO} ${VER})"
          fi

          git commit -m "chore: rebuild marketplace directories${TRIGGER_INFO}"
          git push -u origin "$BRANCH"

          gh pr create \
            --title "chore: rebuild marketplace directories" \
            --body "$(cat <<'EOF'
          ## Summary
          - Rebuilt marketplace directories from latest MCP plugin releases
          - Platforms: cursor, opencode, openhands, claude

          Auto-generated by the rebuild-marketplaces workflow.
          EOF
          )"
