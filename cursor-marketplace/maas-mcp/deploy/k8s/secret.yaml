apiVersion: v1
kind: Secret
metadata:
  name: maas-mcp-secrets
  namespace: maas-mcp
  labels:
    app.kubernetes.io/name: maas-mcp
type: Opaque
stringData:
  # Single-instance mode
  MAAS_API_KEY: ""          # consumer_key:token:secret
  MCP_HTTP_ACCESS_TOKEN: "" # Bearer token clients must send

  # -- OR multi-instance mode (uncomment and set) --
  # MAAS_INSTANCES: '{"prod":{"url":"https://maas-prod/MAAS","api_key":"k:t:s"}}'
