name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout mcp-common
        uses: actions/checkout@v4
        with:
          repository: vhspace/mcp-common
          path: _mcp-common

      - name: Checkout redfish-mcp
        uses: actions/checkout@v4
        with:
          repository: vhspace/redfish-mcp
          token: ${{ secrets.GH_PAT }}
          path: _redfish-mcp

      - name: Place dependencies as siblings
        run: |
          mv _mcp-common ../mcp-common
          mv _redfish-mcp ../redfish-mcp

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Swap git sources to local paths
        run: |
          sed -i 's|mcp-common = { git = "https://github.com/vhspace/mcp-common"[^}]*}|mcp-common = { path = "../mcp-common", editable = true }|g' pyproject.toml
          sed -i 's|redfish-mcp = { git = "https://github.com/vhspace/redfish-mcp"[^}]*}|redfish-mcp = { path = "../redfish-mcp", editable = true }|g' pyproject.toml
          sed -i 's|mcp-common = { git = "https://github.com/vhspace/mcp-common"[^}]*}|mcp-common = { path = "../mcp-common", editable = true }|g' ../redfish-mcp/pyproject.toml
          rm -f uv.lock ../redfish-mcp/uv.lock

      - name: Install dependencies
        run: uv sync --group dev

      - name: Syntax check
        run: uv run python -m compileall -q src tests

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Type check
        continue-on-error: true
        run: uv run mypy src

      - name: Tests
        run: uv run pytest -q --tb=short

  build:
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Build package
        run: uv build
