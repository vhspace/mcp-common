name: Release

permissions:
  contents: read
  issues: read
  pull-requests: read

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release

    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - name: Install uv
        uses: astral-sh/setup-uv@85856786d1ce8acfbcc2f13a5f3fbd6b938f9f41 # v7.1.2
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Version bump
        run: uv run semantic-release version --no-push --no-vcs-release

      - name: Check for new tag
        id: check_tag
        run: |
          TAG=$(git describe --tags --exact-match HEAD 2>/dev/null || true)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          if [ -z "$TAG" ]; then
            echo "No new tag on HEAD — nothing to release."
          fi

      - name: Push via deploy key
        if: steps.check_tag.outputs.tag != ''
        run: git push origin main --follow-tags

      - name: Create GitHub Release
        if: steps.check_tag.outputs.tag != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.check_tag.outputs.tag }}
        run: |
          VERSION="${RELEASE_TAG#v}"
          NOTES=$(awk "/^## ${VERSION}( |$)/,/^## [0-9]/" CHANGELOG.md | sed '1d;$d')
          if [ -z "$NOTES" ]; then
            NOTES="Release ${RELEASE_TAG}"
          fi
          gh release create "$RELEASE_TAG" --title "$RELEASE_TAG" --notes "$NOTES"

      - name: Upload dists to release
        if: steps.check_tag.outputs.tag != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run semantic-release publish
